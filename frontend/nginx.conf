server {
    listen 80;

    # Serve the React SPA.
    # VITE_API_URL handles the backend URL at build time, so no proxy needed here.
    # The /api proxy in docker-compose is handled by the Vite dev server instead.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
